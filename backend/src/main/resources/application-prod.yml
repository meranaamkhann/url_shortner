spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:50}
  jpa:
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
  lifecycle:
    timeout-per-shutdown-phase: 25s

app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}

server:
  forward-headers-strategy: native   # trust X-Forwarded-* from the LB / ingress
  shutdown: graceful

logging:
  level:
    root: WARN
    com.urlshortener: INFO
