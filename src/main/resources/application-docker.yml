spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/urlshortener
    username: ${POSTGRES_USER:urlshortener}
    password: ${POSTGRES_PASSWORD:urlshortener}
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:9092

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

management:
  endpoint:
    health:
      show-details: always
