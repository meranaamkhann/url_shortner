name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: urlshortener_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn -B -ntp clean compile

      - name: Unit tests
        run: mvn -B -ntp test -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/urlshortener_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST: localhost

      - name: Integration tests (Testcontainers)
        run: mvn -B -ntp verify -DskipUnitTests=true

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: 'target/surefire-reports/*.xml,target/failsafe-reports/*.xml'
          reporter: java-junit

      - name: Code coverage (JaCoCo)
        run: mvn -B -ntp jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Package
        run: mvn -B -ntp package -DskipTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: url-shortener-jar
          path: target/url-shortener.jar
          retention-days: 7

  static-analysis:
    name: Static Analysis & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Fails the build on known-vulnerable dependencies (CVE database).
      - name: OWASP Dependency-Check
        run: mvn -B -ntp org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=8

      # Static code analysis for bug patterns, security anti-patterns (SpotBugs +
      # FindSecBugs plugin would be configured in pom.xml's reporting section).
      - name: SpotBugs
        run: mvn -B -ntp com.github.spotbugs:spotbugs-maven-plugin:check
        continue-on-error: true   # advisory in this project; flip to blocking once the baseline is clean

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validates the Dockerfile builds cleanly)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: url-shortener:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scans the built image for OS-package and dependency CVEs before it's
      # ever allowed near a registry, let alone production.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: url-shortener:ci-${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
